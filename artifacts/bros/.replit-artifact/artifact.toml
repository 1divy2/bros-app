kind = "web"
previewPath = "/"
title = "brOS"
version = "1.0.0"
id = "artifacts/bros"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19550

[services.development]
run = "pnpm --filter @workspace/bros run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bros", "run", "build" ]
publicDir = "artifacts/bros/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19550"
BASE_PATH = "/"
